<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Primeiro Programa com Javascript</title>
    <style>
        body {
            background-color: rgb(69, 73, 105);
            color: white;
            font: normal 20px Arial;
        }
    </style>
</head>
<body>

    <h1>Hello World!</h1>
    <p>Iniciando com o <q>Hello World</q> de cada dia.</p>

    <script>
        var nome = window.prompt('Qual é o seu nome?') // Pergunta o nome do usuário
        window.alert('Seja bem-vindo, é um grande prazer te conhecer, ' + nome + '!') // Concatenação
    </script>

</body>
</html>
