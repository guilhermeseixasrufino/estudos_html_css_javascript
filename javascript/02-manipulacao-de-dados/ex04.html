<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font: normal 20pt Arial;
        }
    </style>
</head>
<body>

    <script>
        var nome = window.prompt('Qual é seu nome?')
        document.write(`Olá <strong>${nome}</strong>, seu nome tem ${nome.length} letras. <br/>`) // s.length é utilizado para contar a quantidade de caracteres
        document.write(`Seu nome em maiúsculas é ${nome.toUpperCase()}.<br/>`) // s.toUpperCase serve para colocar todos os caracteres em maiúscula
        document.write(`Seu nome em minúsculas é ${nome.toLocaleLowerCase()}.`) // s.toUpperCase serve para colocar todos os caracteres em minúsculo

        /*
            Para a Formatação de Números:
            n1.toFixed(2) -> Define a quantidade de casas decimais, conforme desejado
            
            n1.toFixed(2).replace('.', ',') -> Substitui o ponto pela vírgula
                resultado: 1400.50 -> 1400,50
            
            n1.tolocaleString('pt-BR', {style: 'currency', currency: 'BRL'})
                resultado: 1400.50  -> R$1400,50
        */
    </script>

</body>
</html>
